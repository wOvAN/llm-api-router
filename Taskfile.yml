# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  default:
    desc: Run tests
    cmds:
      - task: test

  build:
    desc: Build the binary
    cmds:
      - go build -o llm-api-router .

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  testv:
    desc: Run all tests verbosely
    cmds:
      - go test -v ./...

  fmt:
    desc: Format all Go source files
    cmds:
      - go fmt ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f llm-api-router
