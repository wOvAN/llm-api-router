name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Format
        run: go fmt ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.9

      - name: Build
        run: go build -o llm-api-router .

      - name: Test
        run: go test -v ./...

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t llm-api-router .
