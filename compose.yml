services:
  llm-api-router:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/wovan/llm-api-router:latest
    container_name: llm-api-router
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      - PORT=8080
      - CONFIG_FILE=/app/config.json
    volumes:
      - ./config.json:/app/config.json
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
